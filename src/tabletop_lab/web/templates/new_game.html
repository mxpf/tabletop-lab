{% extends "base.html" %}
{% block content %}
<h1>Create a Game</h1>
<form class="form" action="/games" method="post">
  <label>Name <input name="name" required></label>
  <label>Description <input name="description"></label>
  <label>Rules Text <textarea name="rules_text" rows="14" placeholder="Paste rules here"></textarea></label>
  <label>Notes <textarea name="notes" rows="4"></textarea></label>
  <button type="submit">Create Game</button>
</form>
{% endblock %}
